syntax = "proto3";

package bubbles.xq;

// ActivityPubのNoteに相当
message TextNote {
  string id = 1;
  string content = 2;
  string author_id = 3;
  int64 created_at = 4; // Unix timestamp
}

// ActivityPubのPersonに相当
message User {
  string id = 1;
  string username = 2;
  string display_name = 3;
}

// Create Activity
message CreateActivity {
  string id = 1;
  string actor_id = 2;
  TextNote note = 3;
}

// サーバーへのリクエスト
message PostActivityRequest {
  CreateActivity activity = 1;
}

// サーバーからのレスポンス
message PostActivityResponse {
  bool success = 1;
  string message = 2;
  string activity_id = 3;
}
